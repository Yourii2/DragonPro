تظهر <!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <title>تغيير كلمة مرور + صلاحيات</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    button { background: #007cba; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; }
    button:hover { background: #005a87; }
    .success { background: #d4edda; color: #155724; padding: 10px; border-radius: 5px; margin-top: 10px; }
    .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-top: 10px; }
  </style>
</head>
<body>
  <h1>تغيير كلمة مرور + منح صلاحيات كاملة</h1>
  <form id="form">
    <div class="form-group">
      <label>ID المستخدم أو Username:</label>
      <input type="text" id="who" placeholder="مثال: 1 أو admin" required>
    </div>
    <div class="form-group">
      <label>كلمة المرور الجديدة:</label>
      <input type="password" id="newpass" placeholder="كلمة مرور جديدة" required>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="grant" checked> منح كل الصلاحيات؟</label>
    </div>
    <button type="submit">تحديث</button>
  </form>
  <div id="result"></div>

  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const who = document.getElementById('who').value.trim();
      const pass = document.getElementById('newpass').value;
      const grant = document.getElementById('grant').checked;
      const result = document.getElementById('result');
      result.innerHTML = '<p>جاري التحميل...</p>';

      try {
        const resp = await fetch('set_admin_password.php', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({
            'new_password': pass,
            'username_or_id': who,
            'grant_permissions': grant ? 'true' : 'false'
          })
        });
        const text = await resp.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          data = {raw: text};
        }
        if (resp.ok) {
          result.innerHTML = `<div class="success">${data.message || data.raw || 'تم التحديث'}</div>`;
        } else {
          result.innerHTML = `<div class="error">${data.message || text}</div>`;
        }
      } catch (err) {
        result.innerHTML = `<div class="error">خطأ: ${err.message}</div>`;
      }
    });
  </script>
</body>
</html>

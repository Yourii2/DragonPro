<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دراجون برو DragonPro</title>
    <link rel="icon" type="image/png" href="./Dragon.png" />
    <link rel="apple-touch-icon" href="./Dragon.png" />
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Failed', err));
            });
        }
    </script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            .thermal-80 { width: 80mm; font-size: 12px; }
        }
        .rtl-flip { transform: scaleX(-1); }

        /* Custom Animations */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
        .animate-progress {
            animation: progress 3s linear forwards;
        }
        .animate-spin-slow {
            animation: spin 6s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
